<!DOCTYPE html>
<html>
<head>
<title>File Converter Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

.card {
    border-radius:15px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.navbar {
    background:white;
}

.navbar-brand {
    font-weight:bold;
}

</style>
</head>

<body>

<nav class="navbar navbar-light px-3">
    <span class="navbar-brand">🚀 File Converter Pro</span>
</nav>

<div class="container mt-5 text-center">

<h1>All File Tools in One Place</h1>
<p>Convert, merge and process files easily</p>

<div class="row mt-5">

<!-- JPG → PDF -->
<div class="col-md-3">
<div class="card p-3">
<h5>JPG → PDF</h5>
<form action="/convert_to_pdf" method="post" enctype="multipart/form-data">
<input type="file" name="files" multiple class="form-control mb-2">
<button class="btn btn-primary w-100">Convert</button>
</form>
</div>
</div>

<!-- JPG → WORD -->
<div class="col-md-3">
<div class="card p-3">
<h5>JPG → Word</h5>
<form action="/convert_to_word" method="post" enctype="multipart/form-data">
<input type="file" name="file" class="form-control mb-2">
<button class="btn btn-success w-100">Convert</button>
</form>
</div>
</div>

<!-- MERGE PDF -->
<div class="col-md-3">
<div class="card p-3">
<h5>Merge PDF</h5>
<form action="/merge_pdf" method="post" enctype="multipart/form-data">
<input type="file" name="files" multiple class="form-control mb-2">
<button class="btn btn-warning w-100">Merge</button>
</form>
</div>
</div>

<!-- PDF → JPG -->
<div class="col-md-3">
<div class="card p-3">
<h5>PDF → JPG</h5>
<form action="/pdf_to_jpg" method="post" enctype="multipart/form-data">
<input type="file" name="file" class="form-control mb-2">
<button class="btn btn-info w-100">Convert</button>
</form>
</div>
</div>

</div>

</div>

<footer class="text-center mt-5 p-3">
© 2026 File Converter Pro | Designed by Priyanshu Singh
</footer>

</body>
</html>
