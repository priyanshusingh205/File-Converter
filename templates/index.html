<!DOCTYPE html>
<html>
<head>
    <title>File Converter Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
        }
        h1 {
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container text-center mt-5">
    <h1>🚀 File Converter Pro</h1>
    <p class="text-white">Convert files instantly — free & fast</p>

    <div class="row mt-4">

        <!-- JPG → PDF -->
        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h4>JPG → PDF</h4>
                <form action="/convert_to_pdf" method="post" enctype="multipart/form-data">
                    <input type="file" name="files" multiple class="form-control mb-3" required>
                    <button class="btn btn-primary w-100">Convert</button>
                </form>
            </div>
        </div>

        <!-- JPG → WORD -->
        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h4>JPG → Word</h4>
                <form action="/convert_to_word" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-3" required>
                    <button class="btn btn-success w-100">Convert</button>
                </form>
            </div>
        </div>

    </div>

    <div class="row mt-4">


    
        <!-- WORD → PDF -->
        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h4>Word → PDF</h4>
                <form action="/word_to_pdf" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-3" required>
                    <button class="btn btn-danger w-100">Convert</button>
                </form>
            </div>
        </div>

    </div>

</div>

</body>
</html>
