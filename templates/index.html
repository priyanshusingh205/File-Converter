<!DOCTYPE html>
<html>
<head>
    <title>Image Converter Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center mt-5">
    <h1 class="mb-4">📄 Image Converter Pro</h1>

    <!-- JPG → PDF -->
    <div class="card p-4 mb-4 shadow">
        <h3>JPG → PDF</h3>
        <form action="/convert_to_pdf" method="post" enctype="multipart/form-data">
            <input type="file" name="files" multiple class="form-control mb-3" required>
            <button class="btn btn-primary">Convert to PDF</button>
        </form>
    </div>

    <!-- JPG → WORD -->
    <div class="card p-4 shadow">
        <h3>JPG → Word</h3>
        <form action="/convert_to_word" method="post" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-3" required>
            <button class="btn btn-success">Convert to Word</button>
        </form>
    </div>

</div>

</body>
</html>
