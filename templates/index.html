<!DOCTYPE html>
<html>
<head>
    <title>File Converter Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #a18cd1);
            min-height: 100vh;
            color: white;
        }

        .card {
            border-radius: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .upload-box {
            border: 2px dashed white;
            padding: 40px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: rgba(255,255,255,0.1);
        }

        h1 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container text-center mt-5">

    <h1 data-aos="fade-down">🚀 File Converter Pro</h1>
    <p data-aos="fade-up">Convert files instantly — free & fast</p>

    <!-- Drag & Drop -->
    <div class="upload-box mt-4" data-aos="zoom-in">
        <h4>📂 Drag & Drop Files</h4>
        <p>or click below</p>
        <input type="file" class="form-control mt-3">
    </div>

    <!-- Tools -->
    <div class="row mt-5">

        <div class="col-md-4" data-aos="fade-up">
            <div class="card p-3 shadow">
                <h5>JPG → PDF</h5>
                <form action="/convert_to_pdf" method="post" enctype="multipart/form-data">
                    <input type="file" name="files" multiple class="form-control mb-2" required>
                    <button class="btn btn-primary w-100">Convert</button>
                </form>
            </div>
        </div>

        <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
            <div class="card p-3 shadow">
                <h5>JPG → Word</h5>
                <form action="/convert_to_word" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-2" required>
                    <button class="btn btn-success w-100">Convert</button>
                </form>
            </div>
        </div>

        <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
            <div class="card p-3 shadow">
                <h5>Word → PDF</h5>
                <form action="/word_to_pdf" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-2" required>
                    <button class="btn btn-danger w-100">Convert</button>
                </form>
            </div>
        </div>

    </div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init();
</script>

</body>
</html>
